# ============================================================================
#  AutoHunter  ——  AI 自主漏洞挖掘平台
#  Powered By StanleyNull
#  一键启动：  cp .env.example .env  &&  编辑 .env 填 LLM_API_KEY  &&  docker compose up -d --build
#  或直接运行引导脚本：  bash scripts/install.sh
# ============================================================================
services:
  autohunter:
    build: .
    image: autohunter:latest
    container_name: autohunter
    ports:
      # 宿主机端口:容器端口。改宿主机端口：在 .env 里设 AUTOHUNTER_HOST_PORT
      - "${AUTOHUNTER_HOST_PORT:-18800}:18800"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/autohunter.db
      - WORKER_WORK_ROOT=/work
    volumes:
      - ./data:/app/data       # SQLite + 证据持久化（bind mount，数据在项目 data/ 目录）
      - ./work:/work            # worker 临时工作区
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro   # SSH 代理免密私钥（WAF IP 封禁复测用，只读）
    restart: unless-stopped      # 崩溃自动重启，从 DB 恢复任务状态
